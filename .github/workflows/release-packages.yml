name: Release Packages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create or update, for example v0.2.0"
        required: true
      release_name:
        description: "Optional release title override"
        required: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve release metadata
        id: meta
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          INPUT_RELEASE_NAME: ${{ github.event.inputs.release_name }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="$REF_NAME"
          fi

          if [ -z "$TAG" ]; then
            echo "Release tag is required." >&2
            exit 1
          fi

          if [ -n "$INPUT_RELEASE_NAME" ]; then
            RELEASE_NAME="$INPUT_RELEASE_NAME"
          else
            RELEASE_NAME="$TAG"
          fi

          {
            echo "tag=$TAG"
            echo "release_name=$RELEASE_NAME"
          } >> "$GITHUB_OUTPUT"

      - name: Run unit tests
        run: python -m unittest discover -s tests -p 'test_*.py'

      - name: Build release packages
        run: python scripts/build_release_packages.py --output-dir dist

      - name: Prepare release notes
        id: notes
        env:
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          NOTES_FILE="$RUNNER_TEMP/release-notes.md"
          {
            echo "# RootFlowAI Image $TAG"
            echo
            echo "Download the package that matches your host:"
            echo
            echo "- Cherry Studio: \`rootflowai-image-*-cherry-studio.zip\`"
            echo "- Codex Skill import: \`rootflowai-image-*-codex-skill.zip\`"
            echo "- Codex Plugin import: \`rootflowai-image-codex-plugin.zip\`"
            echo "- Claude-compatible skill hosts: \`rootflowai-image-*-claude-compatible.zip\`"
            echo
            echo "The attached \`package-index.json\` file lists every generated artifact."
          } > "$NOTES_FILE"
          echo "path=$NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag }}
          RELEASE_NAME: ${{ steps.meta.outputs.release_name }}
          NOTES_FILE: ${{ steps.notes.outputs.path }}
        run: |
          ASSETS="$(find dist -type f \( -name '*.zip' -o -name 'package-index.json' \) | sort | tr '\n' ' ')"
          if [ -z "$ASSETS" ]; then
            echo "No release assets were generated." >&2
            exit 1
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" $ASSETS --clobber
          else
            gh release create "$TAG" $ASSETS --title "$RELEASE_NAME" --notes-file "$NOTES_FILE" --target "$GITHUB_SHA"
          fi
